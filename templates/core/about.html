<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white/70 backdrop-blur-lg shadow-md px-8 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-blue-600">AI Validator</h1>
    <button onclick="logout()" 
      class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-xl transition">
      Logout
    </button>
  </nav>

  <!-- Profile Container -->
  <div class="flex justify-center items-center mt-12 px-4">
    
    <div class="w-full max-w-3xl bg-white/60 backdrop-blur-lg rounded-3xl shadow-xl p-8">

      <!-- Title -->
      <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">
        My Profile
      </h2>

      <!-- Profile View -->
      <div id="profileView">

        <!-- Avatar -->
        <div class="flex flex-col items-center">
          <img src="https://i.pravatar.cc/120" 
               class="w-28 h-28 rounded-full border-4 border-white shadow-lg mb-4">

          <h3 id="name" class="text-xl font-semibold text-gray-800">John Doe</h3>
          <p id="email" class="text-gray-500">john@example.com</p>
        </div>

        <!-- Info -->
        <div class="mt-6 text-center">
          <p class="text-gray-700">
            <span class="font-semibold">Bio:</span>
            <span id="bio">Frontend Developer | AI Enthusiast</span>
          </p>
        </div>

        <!-- Button -->
        <div class="mt-8 text-center">
          <button onclick="editProfile()" 
            class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-xl transition shadow">
            Edit Profile
          </button>
        </div>

      </div>

      <!-- Edit Form -->
      <div id="editForm" class="hidden">

        <form onsubmit="saveProfile(event)" class="space-y-5">

          <input type="text" id="editName" placeholder="Name"
            class="w-full p-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-400">

          <input type="email" id="editEmail" placeholder="Email"
            class="w-full p-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-400">

          <textarea id="editBio" placeholder="Bio"
            class="w-full p-3 rounded-xl border focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>

          <div class="flex justify-between">
            <button type="submit"
              class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl transition">
              Save
            </button>

            <button type="button" onclick="cancelEdit()"
              class="bg-gray-400 hover:bg-gray-500 text-white px-6 py-2 rounded-xl transition">
              Cancel
            </button>
          </div>

        </form>

      </div>

    </div>

  </div>

  <!-- Script -->
  <script>
    function editProfile() {
      document.getElementById("profileView").classList.add("hidden");
      document.getElementById("editForm").classList.remove("hidden");

      document.getElementById("editName").value = document.getElementById("name").innerText;
      document.getElementById("editEmail").value = document.getElementById("email").innerText;
      document.getElementById("editBio").value = document.getElementById("bio").innerText;
    }

    function cancelEdit() {
      document.getElementById("profileView").classList.remove("hidden");
      document.getElementById("editForm").classList.add("hidden");
    }

    function saveProfile(e) {
      e.preventDefault();

      document.getElementById("name").innerText = document.getElementById("editName").value;
      document.getElementById("email").innerText = document.getElementById("editEmail").value;
      document.getElementById("bio").innerText = document.getElementById("editBio").value;

      cancelEdit();
    }

    function logout() {
      alert("Logout successful!");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
