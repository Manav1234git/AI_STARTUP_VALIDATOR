<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4">
    <h1 class="text-xl font-bold text-blue-600">AI Analysis</h1>
  </nav>

  <main class="max-w-4xl mx-auto p-6">

    <h2 class="text-3xl font-bold mb-6">Startup Analysis</h2>

    <!-- Summary -->
    <div class="bg-white p-6 rounded-xl shadow mb-6">
      <p class="text-gray-700">
        Your idea has strong potential but requires differentiation to stand out in the competitive market.
      </p>
    </div>

    <!-- Factors -->
    <div class="bg-white p-6 rounded-xl shadow space-y-5">

      <div>
        <div class="flex justify-between mb-1">
          <span>Market Demand</span>
          <span>80%</span>
        </div>
        <div class="bg-gray-200 h-2 rounded">
          <div class="bg-green-500 h-2 rounded w-4/5"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>Competition</span>
          <span>60%</span>
        </div>
        <div class="bg-gray-200 h-2 rounded">
          <div class="bg-yellow-500 h-2 rounded w-3/5"></div>
        </div>
      </div>

      <div>
        <div class="flex justify-between mb-1">
          <span>Feasibility</span>
          <span>75%</span>
        </div>
        <div class="bg-gray-200 h-2 rounded">
          <div class="bg-blue-500 h-2 rounded w-3/4"></div>
        </div>
      </div>

    </div>

    <!-- Suggestions -->
    <div class="bg-white p-6 rounded-xl shadow mt-6">
      <h3 class="text-xl font-semibold mb-3">Suggestions</h3>
      <ul class="list-disc ml-5 text-gray-600 space-y-2">
        <li>Target niche audience</li>
        <li>Improve unique features</li>
        <li>Focus on marketing strategy</li>
      </ul>
    </div>

  </main>

</body>
</html>
