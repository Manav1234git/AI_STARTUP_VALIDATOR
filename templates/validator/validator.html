<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validate Idea</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <!-- Navbar -->
  <nav class="bg-white shadow px-6 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-blue-600">AI Validator</h1>
  </nav>

  <main class="max-w-3xl mx-auto p-6">

    <h2 class="text-3xl font-bold mb-6">Validate Your Idea</h2>

    <!-- Form -->
    <div class="bg-white p-6 rounded-xl shadow">

      <form>
        <div class="mb-4">
          <label class="block mb-1 font-medium">Idea</label>
          <textarea class="w-full p-3 border rounded-lg"></textarea>
        </div>

        <div class="mb-4">
          <label class="block mb-1 font-medium">Category</label>
          <input type="text" class="w-full p-3 border rounded-lg">
        </div>

        <div class="mb-4">
          <label class="block mb-1 font-medium">Market</label>
          <input type="text" class="w-full p-3 border rounded-lg">
        </div>

        <button class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
          Validate
        </button>
      </form>

    </div>

    <!-- Result -->
    <div class="bg-white p-6 rounded-xl shadow mt-6">

      <h3 class="text-xl font-semibold mb-4">Result</h3>

      <p class="mb-2">Score: <span class="text-green-500 font-bold">85%</span></p>

      <div class="space-y-3">

        <div>
          <p>Market Demand</p>
          <div class="bg-gray-200 h-2 rounded">
            <div class="bg-green-500 h-2 rounded w-4/5"></div>
          </div>
        </div>

        <div>
          <p>Competition</p>
          <div class="bg-gray-200 h-2 rounded">
            <div class="bg-yellow-500 h-2 rounded w-3/5"></div>
          </div>
        </div>

      </div>

    </div>

  </main>

</body>
</html>
