<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-purple-200 min-h-screen flex items-center justify-center">

  <!-- Login Card -->
  <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-lg">

    <!-- Title -->
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-6">
      Welcome Back 👋
    </h2>

    <!-- Form -->
    <form>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Email</label>
        <input 
          type="email" 
          placeholder="Enter your email"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-gray-600 mb-1">Password</label>
        <input 
          type="password" 
          placeholder="Enter your password"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
      </div>

      <!-- Options -->
      <div class="flex justify-between items-center mb-4 text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="mr-2">
          Remember me
        </label>

        <a href="#" class="text-blue-500 hover:underline">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button 
        type="submit"
        class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition">
        Login
      </button>

    </form>

    <!-- Divider -->
    <div class="my-5 text-center text-gray-400">or</div>

    <!-- Signup Link -->
    <p class="text-center text-gray-600">
      Don’t have an account?
      <a href="#" class="text-blue-500 font-medium hover:underline">
        Sign up
      </a>
    </p>

  </div>

</body>
</html>
